name: Convert PDFs and DOCX to Markdown

on:
  workflow_dispatch:
  push:
    paths:
      - '**.pdf'
      - '**.docx'

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install markitdown
        run: pip install "markitdown[all]"

      - name: Run conversion
        run: python convert.py

      - name: Check for missing Markdown files
        shell: bash
        run: |
          missing=0
          for f in *.pdf *.docx; do
            [ -f "$f" ] || continue
            stem="${f%.*}"
            if [ ! -f "sources-md/${stem}.md" ]; then
              echo "MISSING: sources-md/${stem}.md (source: $f)"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing file(s) have no corresponding .md in sources-md/"
            exit 1
          fi
          echo "All source files have a corresponding .md file."

      - name: Show diff of generated Markdown
        run: git diff --stat sources-md/ || true

      - name: Commit updated sources-md (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sources-md/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update sources-md from PDFs/DOCX [skip ci]"
            git push
          fi
